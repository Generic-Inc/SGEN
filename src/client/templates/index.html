{% extends "base.html" %}

{% block title %}Home - SGEN{% endblock %}

{% block content %}
    <div class="feed-container" style="width: 100%; max-width: 600px;">
        
        <div class="post-card" style="padding: 16px; display: flex; gap: 12px; align-items: center;">
            <div class="user-avatar" style="background-image: url('https://placehold.co/50'); background-size: cover;"></div>
            
            <input type="text" placeholder="What's happening?" style="
                flex: 1; 
                border: none; 
                background: #f0f2f5; 
                border-radius: 20px; 
                padding: 12px 20px; 
                outline: none;
                font-size: 15px;">
        </div>

        <div id="feed-content">
            </div>

    </div>

    <div class="right-sidebar" style="margin-left: 20px;">
        <div class="guidelines-card">
            <div class="guidelines-title">SG Explorers</div>
            <p class="guidelines-text">
                The official community for SGEN users.
                <br><br>
                <strong>1,201 Members</strong><br>
                <span style="color: green;">●</span> 147 Online
            </p>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 12px 0;">
            <div class="guidelines-title">About</div>
            <p class="guidelines-text">
                MBSDay is a day where community members gather and explore Marina Bay Sands together!
            </p>
        </div>
    </div>
{% endblock %}
