{% extends "base.html" %}
{% from "components/post.html" import postsfeed %}

{% block content %}
    {{ postsfeed(posts, user) }}

    <div class="right-sidebar">
        <div class="post-card" style="padding: 24px; margin-top: 0;">
            <h3 style="margin: 0; font-size: 16px;">Welcome to SGEN!</h3>
            <p style="color: #65676B; font-size: 13px; margin: 12px 0; line-height: 1.4;">
                Explore Singapore's vibrant communities, discover events, and connect with people.
            </p>
            <button class="post-submit-btn" style="width: 100%;" onclick="openCreateModal()">
                Create Post
            </button>
        </div>

        <div class="post-card" style="padding: 16px; margin-top: 15px;">
            <div style="font-size: 12px; color: #65676B; font-weight: bold; margin-bottom: 8px;">
                SGEN INC © 2026
            </div>
            <div style="font-size: 12px; color: #65676B;">
                Privacy · Terms · Cookies
            </div>
        </div>
    </div>
{% endblock %}
