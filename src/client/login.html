<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log In</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        /* global styles */
        :root{--primary:#5b4bff;--facebook:#3b5998;--border:#e6e6e6}
        body{font-family:sans-serif;background:#f3f4f6;margin:0;padding:150px}

        /* layout */
        .container{max-width:980px;margin:0 auto;display:grid;grid-template-columns:1fr 420px;gap:20px;align-items:stretch}
        .hero{background:#ddd;border-radius:8px;padding:36px;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;color:#333}
        .banner{background:#cfcfcf;height:180px;width:100%;display:flex;align-items:center;justify-content:center;border-radius:6px;margin-bottom:18px;color:#666}

        /* card */
        .card{background:#fff;border-radius:8px;padding:20px;border:1px solid var(--border);box-shadow:0 6px 18px rgba(16,24,40,0.06)}
        .tabs{display:flex;gap:18px;border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:14px}
        .tabs a{color:#444;text-decoration:none}
        .tabs a.active{border-bottom:3px solid var(--primary);color:var(--primary)}

        form{display:flex;flex-direction:column;gap:12px}
        input,textarea,select{width:93%;padding:12px;border:1px solid var(--border);border-radius:6px;font-size:14px}

        .primary{background:var(--primary);color:#fff;border:none;padding:12px;border-radius:8px;font-weight:700;cursor:pointer;margin-top:6px}

        /* social media style */
        .social{display:flex;flex-direction:column;gap:8px;margin-top:6px}
        .btn-facebook{background:var(--facebook);color:#fff;padding:10px;border-radius:8px;border:none;cursor:pointer}
        .btn-google{display:flex;align-items:center;gap:10px;justify-content:center;padding:10px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer}
        .small{font-size:13px;color:#666;text-align:center;margin-top:10px}

        /* responsive */
        @media(max-width:880px){.container{grid-template-columns:1fr;max-width:520px;padding:0 12px}.hero{order:2}}
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <div class="banner"><img src="SGEN/assets/image(1).png" alt="Placeholder" style="max-width:100%;height:100%;object-fit:cover;border-radius:6px"></div>
        <h2>SGEN</h2>
        <p>For All Generations in Singapore</p>
    </div>

    <form class="card" id="loginForm" method="post" action="/login" novalidate>
        <div class="tabs">
            <a class="active" href="#">Log In</a>
            <a href="Signup.html">Sign Up</a>
        </div>

        <label for="email"></label><input type="email" id="email" name="email" placeholder="Email" required>
        <label for="password"></label><input type="password" id="password" name="password" placeholder="Password" required>

        <button class="primary" type="submit">Log In</button>

        <div class="social">
            <button type="button" class="btn-facebook">Continue with Facebook</button>
            <button type="button" class="btn-google">Continue with Google</button>
        </div>

        <div class="small">Don't have an account? <a class="footer-link" href="Signup.html">Create a new account</a></div>
    </form>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
    const email = document.getElementById('email').value;
    const pwd = document.getElementById('password').value;
    if(!email || !pwd){ e.preventDefault(); alert('Please enter both email and password.'); return false; }
});
</script>

</body>
</html>
