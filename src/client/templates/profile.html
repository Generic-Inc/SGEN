{% extends "base.html" %}

{% block content %}
<div class="main-content" style="max-width: 900px; margin: 0 auto; padding: 20px; display: flex; gap: 20px;">

    <div class="post-card" style="flex: 1; padding: 30px; border-radius: 12px; height: fit-content;">
        <div style="text-align: center; margin-bottom: 20px;">
            <img id="profile-avatar" src="" style="width: 120px; height: 120px; border-radius: 50%; border: 3px solid #f0f2f5;">
            <h2 id="profile-display-name" style="margin: 15px 0 5px 0; font-size: 24px;">Loading...</h2>
            <p id="profile-username" style="color: #65676B; margin: 0;">@username</p>
        </div>
        <p id="profile-bio" style="font-size: 15px; line-height: 1.5; color: #1c1e21; border-top: 1px solid #eee; padding-top: 15px;">Bio loading...</p>
        <div style="margin-top: 20px; font-size: 12px; color: #8a8d91;">
            Joined <span id="profile-joined">...</span>
        </div>
    </div>

    <div class="post-card" style="flex: 1.2; padding: 25px; border-radius: 12px;">
        <h3 style="margin: 0 0 15px 0; font-size: 16px; color: #1c1e21; text-transform: uppercase; letter-spacing: 1px;">
            Joined Communities
        </h3>
        <div style="height: 1px; background: #eee; margin-bottom: 20px;"></div>

        <div id="user-communities-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px;">
            </div>
    </div>
</div>

<script>
    window.targetUserId = {{ target_id }};
</script>
{% endblock %}
