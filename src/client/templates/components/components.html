{% macro topnav() %}
<div class="header">
    <div class="logo-section">
        <div class="logo">
            <img src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png" alt="SGEN Logo" class="logo-img">
        </div>
        <div class="brand-name">SGEN</div>
    </div>
    <div class="header-actions">
        <button class="create-btn">
            <span>+</span>
            <span>Create</span>
        </button>
        <div class="profile-icon"></div>
    </div>
</div>
{% endmacro %}

{% macro sidenav() %}
<div class="sidebar">
    <div class="nav-item" onclick="loadHomeFeed()" style="cursor: pointer;">
        <span class="material-icons">home</span>
        <span>Home</span>
    </div>

    <div class="nav-item">
        <span class="material-icons">chat_bubble_outline</span>
        <span>SG Explorers Chat</span>
    </div>
    <div class="nav-item">
        <span class="material-icons">event</span>
        <span>SG Explorers Events</span>
    </div>

    <div class="section-title">Your Communities ▼</div>

    <div class="community-item" onclick="loadCommunityFeed(1, this)">
        <span class="material-icons">groups</span>
        <span>SG Explorers</span>
    </div>

    <div class="community-item" onclick="loadCommunityFeed(2, this)">
        <span class="material-icons">groups</span>
        <span>SG Foodies</span>
    </div>

    <div class="section-title">Recommended Communities ▼</div>
    <div class="community-item">
        <span class="material-icons">groups</span>
        <span>SG Hawker Centers</span>
    </div>
</div>
{% endmacro %}
