{% macro postsfeed(posts) %}
<div class="community-container">

    <div class="feed-container">
        {% for post in posts %}
        <div class="post-card">
            <div class="post-header">
                <img src="{{ post.author.avatar_url }}" alt="{{ post.author.display_name }}" class="post-avatar">
                <div class="post-info">
             .       <h4 class="post-author">{{post.author.display_name}}</h4>
                    <span>{{post.created}}</span>
                </div>
            </div>
            <div class="post-content">
                <p>{{post.content}}</p>
                <img src="{{ post.image_url }}" class="post-image">
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endmacro %}
